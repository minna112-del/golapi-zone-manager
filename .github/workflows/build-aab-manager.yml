name: Build Zone Manager AAB+APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'

      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK 34
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          sdkmanager "platform-tools"

      - name: Install Pillow
        run: pip install Pillow

      - name: Setup Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > /tmp/release.keystore
            echo "Keystore loaded from secret"
          else
            keytool -genkeypair \
              -alias golapi-customer \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -keystore /tmp/release.keystore \
              -storepass golapi2024 -keypass golapi2024 \
              -dname "CN=Golapi Manager,O=Golapi,C=BD" \
              -noprompt
            echo "New keystore generated"
          fi
          keytool -list -v -keystore /tmp/release.keystore \
            -storepass "${KEY_STORE_PASSWORD:-golapi2024}" 2>/dev/null | grep "SHA256" || \
          keytool -list -v -keystore /tmp/release.keystore \
            -storepass golapi2024 2>/dev/null | grep "SHA256" || echo "SHA256 check skipped"

      - name: Prepare Icons
        run: |
          python3 << 'PYEOF'
          import base64, os
          from PIL import Image
          import io

          logo_b64 = ""

          img_data = base64.b64decode(logo_b64)
          img = Image.open(io.BytesIO(img_data))
          if img.mode != 'RGBA':
              img = img.convert('RGBA')

          os.makedirs("app/src/main/res/mipmap-mdpi", exist_ok=True)
          os.makedirs("app/src/main/res/mipmap-hdpi", exist_ok=True)
          os.makedirs("app/src/main/res/mipmap-xhdpi", exist_ok=True)
          os.makedirs("app/src/main/res/mipmap-xxhdpi", exist_ok=True)
          os.makedirs("app/src/main/res/mipmap-xxxhdpi", exist_ok=True)

          sizes = {
              'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192
          }
          for folder, size in sizes.items():
              resized = img.resize((size, size), Image.LANCZOS)
              resized.save(f"app/src/main/res/{folder}/ic_launcher.webp", "WEBP", quality=90)
              resized.save(f"app/src/main/res/{folder}/ic_launcher_round.webp", "WEBP", quality=90)

          # 512x512 for Play Store
          big = img.resize((512, 512), Image.LANCZOS)
          big.save("ic_launcher_512.webp", "WEBP", quality=95)
          print("Icons generated successfully")
          PYEOF

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java app/src/main/res/values app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi app/src/main/res/xml
          mkdir -p gradle/wrapper

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          include ':app'
          rootProject.name = "GolapiManager"
          EOF

          # build.gradle (root)
          cat > build.gradle << 'EOF'
          plugins {
            id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # gradle.properties
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # app/build.gradle
          RUN_NUM=${{ github.run_number }}
          STORE_PASS="${KEY_STORE_PASSWORD:-golapi2024}"
          KEY_AL="${KEY_ALIAS:-golapi-customer}"
          KEY_PASS="${KEY_PASSWORD:-golapi2024}"

          cat > app/build.gradle << EOF
          plugins { id 'com.android.application' }
          android {
            compileSdk 34
            namespace "online.golapishop.manager"
            defaultConfig {
              applicationId "online.golapishop.manager"
              minSdk 21
              targetSdk 34
              versionCode ${RUN_NUM}
              versionName "1.0.${RUN_NUM}"
            }
            signingConfigs {
              release {
                storeFile file("/tmp/release.keystore")
                storePassword "${STORE_PASS}"
                keyAlias "${KEY_AL}"
                keyPassword "${KEY_PASS}"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled false
              }
            }
            packaging {
              resources {
                excludes += ['META-INF/**']
              }
            }
          }
          dependencies {
            implementation 'androidx.browser:browser:1.8.0'
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # AndroidManifest.xml Гўв‚¬вЂќ with deep link routing
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <application
              android:allowBackup="true"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:label="@string/app_name"
              android:theme="@style/AppTheme">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data
                  android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://www.golapishop.online/manager" />
                <meta-data
                  android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                  android:resource="@color/colorPrimary" />
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https"
                        android:host="www.golapishop.online"
                        android:pathPrefix="/"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          # res/values/strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Golapi Manager</string>
          </resources>
          EOF

          # res/values/colors.xml
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#2E7D32</color>
            <color name="colorPrimaryDark">#1B5E20</color>
            <color name="colorAccent">#66BB6A</color>
          </resources>
          EOF

          # res/values/styles.xml Гўв‚¬вЂќ built-in Material theme
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
              <item name="android:colorPrimary">@color/colorPrimary</item>
              <item name="android:colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="android:colorAccent">@color/colorAccent</item>
              <item name="android:windowBackground">@android:color/white</item>
            </style>
          </resources>
          EOF

          echo "Android project structure created successfully"

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Build Release AAB + APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          echo "=== Building AAB (Play Store) ==="
          ./gradlew bundleRelease --no-daemon --stacktrace 2>&1 | tee build_output.txt
          echo ""
          echo "=== Building APK (Direct Install) ==="
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee -a build_output.txt
          echo ""
          echo "=== Build artifacts ==="
          find app/build/outputs -name "*.aab" -o -name "*.apk" | while read f; do
            echo "  $(basename $f): $(ls -lh $f | awk '{print $5}')"
          done

      - name: Upload AAB Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: golapi-manager-aab-v${{ github.run_number }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: golapi-manager-apk-v${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          name: "Golapi Manager v1.0.${{ github.run_number }}"
          tag_name: "manager-v1.0.${{ github.run_number }}"
          body: |
            ## Golapi Manager v1.0.${{ github.run_number }}

            Г°ЕёвЂњвЂ№ Zone Manager App Гўв‚¬вЂќ Golapi Manager Online

            **Package:** online.golapishop.manager
            **Site:** https://www.golapishop.online
            **Build:** ${{ github.run_number }}

            ### Downloads
            - Г°ЕёвЂњВ± APK (direct install)
            - Г°ЕёВЏВЄ AAB (Play Store upload)
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab