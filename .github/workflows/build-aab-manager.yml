# AAB + APK Build Workflow Гўв‚¬вЂќ CUSTOMER APP
# File: .github/workflows/build-aab.yml
# Repo: golapishop-customer
# Builds BOTH .aab (Play Store) and .apk (direct install)
# Includes deep link routing + Firebase auto-update
