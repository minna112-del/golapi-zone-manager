name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  keygen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias golapi-customer \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore release.keystore \
            -storepass golapi2024 \
            -keypass golapi2024 \
            -dname "CN=Golapi Shop, OU=Mobile, O=Golapi Shop Online, L=Noakhali, S=Chattogram, C=BD" \
            -noprompt

      - name: Show SHA256 Fingerprint
        run: |
          echo "=== SHA256 (assetlinks.json-এ বসাও) ==="
          keytool -list -v \
            -keystore release.keystore \
            -storepass golapi2024 \
            -alias golapi-customer | grep "SHA256"

      - name: Export Base64 Keystore
        run: |
          echo ""
          echo "=== KEYSTORE_BASE64 Secret-এ বসাও ==="
          base64 -w 0 release.keystore
          echo ""

      - uses: actions/upload-artifact@v4
        with:
          name: customer-keystore
          path: release.keystore