name: Build Golapi Zone Manager APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK 34
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow
        run: pip install Pillow -q

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore

      - name: Build TWA Project
        run: echo "" | base64 --decode | python3

      - name: Generate Gradle Wrapper
        run: cd app && gradle wrapper --gradle-version 8.4

      - name: Build APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: cd app && chmod +x gradlew && ./gradlew assembleRelease --stacktrace

      - name: Collect APK
        run: cp $(find app -name "*.apk" -path "*/release/*" | head -1) output.apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ZONE }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: output.apk
          releaseNotes: "Build #${{ github.run_number }} - নতুন আপডেট"

      - uses: actions/upload-artifact@v4
        with:
          name: golapi-zonemanager-v${{ github.run_number }}
          path: output.apk

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: zone-v${{ github.run_number }}
          name: "Golapi Golapi Zone Manager v${{ github.run_number }}"
          files: output.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}