name: Build Zone Manager APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias golapi \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=Golapi Zone Manager,OU=Dev,O=MT Studio,L=Noakhali,ST=Chittagong,C=BD"

      - name: Create TWA Android project
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/java/online.golapishop.zonemanager
          mkdir -p gradle/wrapper

          # Download Gradle wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.7-bin.zip" -o gradle/wrapper/gradle-8.7-bin.zip
          cat > gradle/wrapper/gradle-wrapper.properties << 'GWEOF'
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GWEOF

          # settings.gradle
          echo 'rootProject.name = "GalapiShop"' > settings.gradle

          # Top-level build.gradle
          cat > build.gradle << 'BGEOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          BGEOF

          # app/build.gradle
          cat > app/build.gradle << 'ABEOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'online.golapishop.zonemanager'
              compileSdk 34
              defaultConfig {
                  applicationId "online.golapishop.zonemanager"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"

                  manifestPlaceholders = [
                    hostName: "www.golapishop.online",
                    defaultUrl: "https://www.golapishop.online/#zone-manager",
                    launcherName: "Golapi Zone Manager",
                    assetStatements: '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"web","site":"https://www.golapishop.online"}}]',
                    themeColor: "#7B1FA2",
                    navigationColor: "#7B1FA2",
                    navigationColorDark: "#4A148C",
                    navigationDividerColor: "#7B1FA2",
                    navigationDividerColorDark: "#4A148C",
                    backgroundColor: "#F3E5F5",
                    enableNotifications: "true",
                    splashScreenFadeOutDuration: "300"
                  ]
              }
              signingConfigs {
                  release {
                      storeFile file("../../release.keystore")
                      storePassword "android123"
                      keyAlias "golapi"
                      keyPassword "android123"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          ABEOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'AMEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:label="${launcherName}"
                  android:icon="@drawable/ic_launcher"
                  android:allowBackup="true"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">

                  <meta-data
                      android:name="asset_statements"
                      android:value='${assetStatements}' />

                  <activity
                      android:name="android.support.customtabs.trusted.LauncherActivity"
                      android:exported="true"
                      android:theme="@style/LaunchTheme">

                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="${defaultUrl}" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="${themeColor}" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:value="${navigationColor}" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:value="${backgroundColor}" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_FADE_OUT_DURATION"
                          android:value="${splashScreenFadeOutDuration}" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SCREEN_ORIENTATION"
                          android:value="portrait" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="${hostName}" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          AMEOF

          # styles.xml
          cat > app/src/main/res/values/styles.xml << 'SEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#F3E5F5</item>
                  <item name="colorPrimary">#7B1FA2</item>
                  <item name="colorPrimaryDark">#4A148C</item>
              </style>
              <style name="LaunchTheme" parent="AppTheme">
                  <item name="android:windowBackground">#F3E5F5</item>
              </style>
          </resources>
          SEOF

          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'STREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Golapi Zone Manager</string>
          </resources>
          STREOF

          # Download logo as launcher icon
          curl -sL "https://raw.githubusercontent.com/minna112-del/golapishop.online/main/logo.jpeg" -o logo_temp.jpeg
          # Convert to PNG for Android (use ImageMagick if available, otherwise use as-is)
          cp logo_temp.jpeg app/src/main/res/drawable/ic_launcher.jpeg
          # Create a simple XML drawable that references it
          cat > app/src/main/res/drawable/ic_launcher.xml << 'ICEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@color/ic_launcher_background"/>
          </adaptive-icon>
          ICEOF
          cat > app/src/main/res/values/colors.xml << 'CEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#7B1FA2</color>
          </resources>
          CEOF

      - name: Build APK with Gradle
        run: |
          chmod +x gradlew 2>/dev/null || true
          # Use gradle directly since we don't have gradlew
          gradle wrapper --gradle-version 8.7 || true
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Golapi-Zone-Manager
          path: app/build/outputs/apk/release/*.apk