name: Build Golapi Zone Manager APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK 34
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow
        run: pip install Pillow -q

      - name: Download App Icon
        run: |
          curl -L "https://github.com/minna112-del/golapishop.online/blob/main/icons/zone_manager_logo.webp" -o icon.webp
          python3 -c "
          from PIL import Image
          import os
          img = Image.open('icon.webp').convert('RGBA')
          os.makedirs('.github/icons', exist_ok=True)
          img.save('.github/icons/zone_manager_logo.webp')
          print('Icon ready')
          "

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore

      - name: Build TWA Project
        run: |
          python3 - <<'PYEOF'
          import os
          from PIL import Image

          try:
            LANCZOS = Image.Resampling.LANCZOS
          except:
            LANCZOS = Image.LANCZOS

          for dn in ['mdpi','hdpi','xhdpi','xxhdpi','xxxhdpi']:
            os.makedirs(f'app/app/src/main/res/mipmap-{dn}', exist_ok=True)
          os.makedirs('app/app/src/main/res/values', exist_ok=True)

          src = Image.open('.github/icons/ic_launcher.png').convert('RGBA')
          for sz,dn in [(48,'mdpi'),(72,'hdpi'),(96,'xhdpi'),(144,'xxhdpi'),(192,'xxxhdpi')]:
            src.resize((sz,sz), resample=LANCZOS).save(f'app/app/src/main/res/mipmap-{dn}/ic_launcher.png')

          open('app/settings.gradle','w').write('rootProject.name = "GolapiCustomer"\ninclude ":app"\n')
          open('app/build.gradle','w').write('''buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:8.2.2" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          ''')
          open('app/gradle.properties','w').write('android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx2048m\n')
          open('app/app/build.gradle','w').write('''plugins { id "com.android.application" }
          configurations.all {
            exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
            exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
            resolutionStrategy.eachDependency { d ->
              if (d.requested.group == "org.jetbrains.kotlin") d.useVersion "1.9.24"
            }
          }
          android {
            namespace "online.golapishop.customer"
            compileSdk 34
            defaultConfig {
              applicationId "online.golapishop.customer"
              minSdk 21
              targetSdk 34
              versionCode (System.getenv("GITHUB_RUN_NUMBER")?.toInteger() ?: 1)
              versionName "1." + (System.getenv("GITHUB_RUN_NUMBER") ?: "0")
            }
            signingConfigs {
              release {
                storeFile file("/tmp/release.keystore")
                storePassword System.getenv("KEY_STORE_PASSWORD")?.trim()
                keyAlias System.getenv("KEY_ALIAS")?.trim()
                keyPassword System.getenv("KEY_PASSWORD")?.trim()
              }
            }
            buildTypes {
              release { minifyEnabled false; signingConfig signingConfigs.release }
            }
            packaging { excludes += ["META-INF/versions/9/previous-compilation-data.bin"] }
          }
          dependencies {
            implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"
            implementation "androidx.appcompat:appcompat:1.7.0"
          }
          ''')
          open('app/app/src/main/AndroidManifest.xml','w').write('''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="Golapi Shop" android:icon="@mipmap/ic_launcher" android:theme="@style/AppTheme" android:allowBackup="true">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://www.golapishop.online/" />
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                <intent-filter android:autoVerify="true"><action android:name="android.intent.action.VIEW"/><category android:name="android.intent.category.DEFAULT"/><category android:name="android.intent.category.BROWSABLE"/><data android:scheme="https" android:host="www.golapishop.online"/></intent-filter>
              </activity>
            </application>
          </manifest>
          ''')
          open('app/app/src/main/res/values/styles.xml','w').write('''<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">#C2185B</item>
            </style>
          </resources>
          ''')
          print('All files created OK')
          PYEOF

      - name: Generate Gradle Wrapper
        run: cd app && gradle wrapper --gradle-version 8.4

      - name: Build APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: cd app && chmod +x gradlew && ./gradlew assembleRelease --stacktrace

      - name: Collect APK
        run: cp $(find app -name "*.apk" -path "*/release/*" | head -1) golapi-customer.apk

      - uses: actions/upload-artifact@v4
        with:
          name: golapi-customer-v${{ github.run_number }}
          path: golapi-customer.apk

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Golapi Shop v${{ github.run_number }}"
          files: golapi-customer.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
