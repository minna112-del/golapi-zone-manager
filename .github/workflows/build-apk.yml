name: Build Zone Manager APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          set -e
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

          keytool -genkeypair -v -keystore release.keystore -alias app \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pass1234 -keypass pass1234 \
            -dname "CN=Golapi,O=MTStudio,L=Noakhali,C=BD"

          mkdir -p app/src/main/res/values app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi

          cat > settings.gradle << 'S'
          rootProject.name = 'GolapiZM'
          include ':app'
          S

          cat > build.gradle << 'B'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          B

          echo 'android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m' > gradle.properties

          cat > app/build.gradle << 'A'
          apply plugin: 'com.android.application'
          android {
              namespace 'online.golapishop.zonemanager'
              compileSdk 34
              defaultConfig {
                  applicationId "online.golapishop.zonemanager"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              signingConfigs {
                  release {
                      storeFile file("../release.keystore")
                      storePassword "pass1234"
                      keyAlias "app"
                      keyPassword "pass1234"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.browser:browser:1.7.0'
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          A

          cat > app/src/main/AndroidManifest.xml << 'M'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="Golapi Zone Manager" android:icon="@mipmap/ic_launcher"
              android:allowBackup="true" android:theme="@style/AppTheme">
              <meta-data android:name="asset_statements"
                android:value='[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"web","site":"https://www.golapishop.online"}}]'/>
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://www.golapishop.online/#zone-manager"/>
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                  android:value="#7B1FA2"/>
                <meta-data android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                  android:value="#7B1FA2"/>
                <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                  android:value="#F3E5F5"/>
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="www.golapishop.online"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          M

          cat > app/src/main/res/values/styles.xml << 'T'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowBackground">#F3E5F5</item>
              <item name="colorPrimary">#7B1FA2</item>
              <item name="colorPrimaryDark">#4A148C</item>
            </style>
          </resources>
          T

          python3 -c "
          import struct, zlib
          def png(w,h,r,g,b):
              raw = b''
              for y in range(h): raw += b'\x00' + bytes([r,g,b]) * w
              d = zlib.compress(raw)
              def chunk(t,data): return struct.pack('>I',len(data)) + t + data + struct.pack('>I',zlib.crc32(t+data)&0xffffffff)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0)) + chunk(b'IDAT',d) + chunk(b'IEND',b'')
          for d,s in [('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144)]:
              open(f'app/src/main/res/{d}/ic_launcher.png','wb').write(png(s,s,123,31,162))
          "

          gradle wrapper --gradle-version 8.5 && chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: Golapi-Zone-Manager-APK
          path: app/build/outputs/apk/release/*.apk