name: Build Golapi Zone Manager APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore
      - name: Build TWA Project
        run: |
          mkdir -p app/app/src/main/res/mipmap-mdpi app/app/src/main/res/mipmap-hdpi
          mkdir -p app/app/src/main/res/mipmap-xhdpi app/app/src/main/res/mipmap-xxhdpi
          mkdir -p app/app/src/main/res/values

          python3 -c "
          import struct,zlib
          def png(w,h,r,g,b):
            def c(n,d): crc=zlib.crc32(n+d)&0xffffffff; return struct.pack('>I',len(d))+n+d+struct.pack('>I',crc)
            raw=b''.join(b'\x00'+bytes([r,g,b]*w) for _ in range(h))
            return b'\x89PNG\r\n\x1a\n'+c(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+c(b'IDAT',zlib.compress(raw))+c(b'IEND',b'')
          for p,s in [('app/app/src/main/res/mipmap-mdpi/ic_launcher.png',48),('app/app/src/main/res/mipmap-hdpi/ic_launcher.png',72),('app/app/src/main/res/mipmap-xhdpi/ic_launcher.png',96),('app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png',144)]:
            open(p,'wb').write(png(s,s,123,31,162))
          print('Icons done')
          "

          cat > app/settings.gradle << 'EOF'
          rootProject.name = "GolApiZone"
          include ':app'
          EOF

          cat > app/build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > app/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          configurations.all {
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
            resolutionStrategy.eachDependency { d ->
              if(d.requested.group == 'org.jetbrains.kotlin') d.useVersion '1.9.24'
            }
          }
          android {
            namespace 'online.golapishop.zone'
            compileSdk 34
            defaultConfig {
              applicationId 'online.golapishop.zone'
              minSdk 19; targetSdk 34
              versionCode 1; versionName '1.0'
            }
            signingConfigs {
              release {
                storeFile file('/tmp/release.keystore')
                storePassword System.getenv('KEY_STORE_PASSWORD')
                keyAlias System.getenv('KEY_ALIAS')
                keyPassword System.getenv('KEY_PASSWORD')
              }
            }
            buildTypes {
              release { minifyEnabled false; signingConfig signingConfigs.release }
            }
            packagingOptions { exclude 'META-INF/versions/9/previous-compilation-data.bin' }
          }
          dependencies {
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
            implementation 'androidx.appcompat:appcompat:1.7.0'
          }
          EOF

          cat > app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="Golapi Zone Manager" android:icon="@mipmap/ic_launcher" android:theme="@style/AppTheme" android:allowBackup="true">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://www.golapishop.online/?role=zone-manager" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="www.golapishop.online"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > app/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">#7B1FA2</item>
            </style>
          </resources>
          EOF

      - name: Setup Gradle Wrapper
        run: cd app && gradle wrapper --gradle-version 8.4
      - name: Build APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd app && chmod +x gradlew && ./gradlew assembleRelease --stacktrace
      - name: Collect APK
        run: cp $(find app -name "*.apk" | head -1) golapi-zone-manager.apk
      - uses: actions/upload-artifact@v4
        with:
          name: golapi-zone-manager-v${{ github.run_number }}
          path: golapi-zone-manager.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: zone-v${{ github.run_number }}
          name: "Golapi Zone Manager v${{ github.run_number }}"
          files: golapi-zone-manager.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}